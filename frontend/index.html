
<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>
    <style>
        
table {
    border-collapse: collapse;
}
th, td {
    padding: 10px;
    text-align: center;
}
th {
    background: #007bff;
    color: white;
}

body {
    font-family: Arial;
    text-align: center;

    background: linear-gradient(to right, #a1c4fd, #fbc2eb);
    background-size: cover;
}
.container {
    background: rgba(255, 255, 255, 0.9);
    padding: 20px;
    margin: 20px auto;
    width: 85%;
    border-radius: 10px;
}

h2 {
    color: #333;
}

input {
    padding: 8px;
    margin: 5px;
    width: 200px;
}

button {
    padding: 8px 12px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}

.card {
    background: white;
    padding: 15px;
    margin: 15px auto;
    width: 300px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.logout-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: red;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
}

.logout-btn:hover {
    background: darkred;
}
</style>
</head>

<body>
    <button class="logout-btn" onclick="logout()">Logout</button>
    <div class=""container">

<h2>📚 Online Notes Management System</h2>

<!-- SEARCH -->
<input type="text" id="search" placeholder="Search notes">
<button onclick="searchNotes()">Search</button>

<hr>

<!-- UPLOAD -->
<h3>Upload Note</h3>
<input type="file" id="file"><br><br>
<input type="text" id="title" placeholder="Title"><br><br>
<input type="text" id="subject" placeholder="Subject"><br><br>

<button onclick="upload()">Upload</button>

<hr>

<!-- NOTES -->
<h3>All Notes</h3>
<table border="1" style="margin:auto; width:80%; background:white;">
    <thead>
        <tr>
            <th>Title</th>
            <th>Subject</th>
            <th>Download</th>
        </tr>
    </thead>
    <tbody id="notes"></tbody>
</table>

<script>

function upload() {
    let file = document.getElementById("file").files[0];
    if(!file){
        alert("Please choose a file.");
        return;
    }
    let title = document.getElementById("title").value;
    let subject = document.getElementById("subject").value;

    let formData = new FormData();
    formData.append("file", file);
    formData.append("title", title);
    formData.append("subject", subject);

    fetch("http://localhost:8080/notes/upload", {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(data => {
        alert(data);
        loadNotes();
    });
}

function loadNotes() {
    fetch("http://localhost:8080/notes")
    .then(res => res.json())
    .then(data => {
        let html = "";
        data.forEach(n => {
            html += `
<tr>
    <td>${n.title}</td>
    <td>${n.subject}</td>
    <td>
        <a href="http://localhost:8080/notes/download/${n.id}">
            <button>Download</button>
        </a>
    </td>
</tr>
`;
        });
        document.getElementById("notes").innerHTML = html;
    });
}

function searchNotes() {
    let keyword = document.getElementById("search").value;

    fetch(`http://localhost:8080/notes/search?keyword=${keyword}`)
    .then(res => res.json())
    .then(data => {
        let html = "";
        data.forEach(n => {
  html += `
<tr>
    <td>${n.title}</td>
    <td>${n.subject}</td>
    <td>
        <a href="http://localhost:8080/notes/download/${n.id}">
            <button>Download</button>
        </a>
    </td>
</tr>
`;
        });
        document.getElementById("notes").innerHTML = html;
    });
}

// auto load
loadNotes();

</script>
</div>
<script>
    function logout(){
        window.location.href="login.html";
    }
</script>
</body>

</html>
